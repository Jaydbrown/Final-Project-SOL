# RabbitMQ broker for LocalDAO backends (workers + publishers).
#
# Usage (from backend/ directory):
#   docker compose -f docker-compose.rabbitmq.yml up -d
#
# UI: http://localhost:15672 guest / guest — change defaults for production AMIs/clusters.

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: localdao-rabbitmq
    hostname: localdao-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - localdao_rabbit_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  localdao_rabbit_data:
